steps:
  # Pull the previous image to use as layer cache.
  # "|| true" so the first-ever build doesn't fail when there's no image yet.
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args: ['-c', 'docker pull us-central1-docker.pkg.dev/$PROJECT_ID/insurance-rag/app:latest || true']

  # Build — reuse cached layers from the previous image.
  # When only docs/ or server.py change, the torch/model/indices layers
  # come from cache and the build takes ~2 min instead of ~20 min.
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - --cache-from
      - us-central1-docker.pkg.dev/$PROJECT_ID/insurance-rag/app:latest
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/insurance-rag/app:latest
      - .

  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - us-central1-docker.pkg.dev/$PROJECT_ID/insurance-rag/app:latest

  # Deploy to Cloud Run.
  # GEMINI_API_KEY is already configured on the service — don't touch it here.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - insurance-rag
      - --image=us-central1-docker.pkg.dev/$PROJECT_ID/insurance-rag/app:latest
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --memory=4Gi
      - --cpu=2
      - --min-instances=0
      - --max-instances=3
      - --port=8080

images:
  - us-central1-docker.pkg.dev/$PROJECT_ID/insurance-rag/app:latest

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
